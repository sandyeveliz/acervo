site_name: Acervo
site_description: Layered memory for AI agents
site_url: https://sandyeveliz.github.io/acervo
repo_url: https://github.com/sandyeveliz/acervo
repo_name: sandyeveliz/acervo

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Layers: layers.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
