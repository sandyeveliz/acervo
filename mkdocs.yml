site_name: Acervo
site_description: Context proxy for AI agents
site_url: https://sandyeveliz.github.io/acervo
repo_url: https://github.com/sandyeveliz/acervo
repo_name: sandyeveliz/acervo

theme:
  name: material
  palette:
    scheme: slate
  features:
    - navigation.instant
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Layers: layers.md
  - Benchmarks: benchmarks.md
  - Benchmark Guide: benchmark-guide.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - attr_list
