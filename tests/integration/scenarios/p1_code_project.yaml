name: p1_code_project
category: indexed_project
description: "Test context retrieval for a code project (TODO app with React + Express)"
project_path: "D:/Development/project-tests/p1-todo-app"

questions:
  - text: "Explain the app architecture"
    intent: overview
    expect_in_context:
      - "src/"
      - "controllers"
      - "backend"
    expect_not_in_context:
      - "CAPITULO"
    expect_answer_contains:
      - "React"
      - "Express"

  - text: "What endpoints does the API expose?"
    intent: specific
    expect_in_context:
      - "controller"
    expect_answer_contains:
      - "todo"

  - text: "How does authentication work?"
    intent: specific
    expect_answer_contains:
      - "JWT"

  - text: "What database does the app use?"
    intent: specific
    expect_answer_contains:
      - "SQLite"
