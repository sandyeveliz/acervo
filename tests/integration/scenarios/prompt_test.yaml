name: prompt_test
category: prompt_eval
description: "Short scenario (10 turns) for comparing extraction prompt variants"

turns:
  # ── Intro with clear entities ──
  - user_msg: "Me llamo Sandy y soy programador, vivo en Cipolletti"
    assistant_msg: "Hola Sandy! Cipolletti en la Patagonia, lindo lugar."
    phase: intro
    description: "Name, profession, location"
    expected_entities:
      - label: "sandy"
      - label: "cipolletti"

  - user_msg: "Trabajo en Alto Valle Studio, es una empresa de software en Neuquen"
    assistant_msg: "Genial, que tipo de proyectos hacen?"
    phase: intro
    description: "Workplace"
    expected_entities:
      - label: "alto_valle_studio"

  - user_msg: "Estamos desarrollando un producto que se llama Chequear, es un SaaS de verificacion con NFC"
    assistant_msg: "Interesante, verificacion con NFC tiene mucho potencial en logistica."
    phase: intro
    description: "Product"
    expected_entities:
      - label: "chequear"

  # ── Technical depth ──
  - user_msg: "El stack es React con Vite para el frontend y Supabase para el backend"
    assistant_msg: "React + Supabase es un stack moderno y productivo."
    phase: deep_dive
    description: "Tech stack"
    expected_entities:
      - label: "react"
      - label: "supabase"

  - user_msg: "Tambien estoy haciendo un proyecto personal con Python que se llama Acervo, es un context proxy para AI agents"
    assistant_msg: "Un context proxy es una buena idea para manejar memoria en agentes."
    phase: deep_dive
    description: "Side project"
    expected_entities:
      - label: "acervo"
      - label: "python"

  # ── Small talk (should not create entities) ──
  - user_msg: "Che, hace un calor terrible hoy"
    assistant_msg: "Si, el verano en la Patagonia puede ser intenso."
    phase: small_talk
    description: "Weather small talk"
    max_new_nodes: 1

  - user_msg: "Bueno, dale, volvamos al tema"
    assistant_msg: "Si, contame mas."
    phase: small_talk
    description: "Transition"
    max_new_nodes: 0

  # ── Context recall ──
  - user_msg: "Que sabes de mis proyectos?"
    assistant_msg: "Trabajas en Chequear con React y Supabase, y tenes Acervo como proyecto personal."
    phase: return
    description: "Recall check"
    checkpoint:
      should_have_context: true
      context_should_mention: ["Sandy"]

  # ── New entities ──
  - user_msg: "Mi companiero de trabajo es Facu, el hace el mobile con Expo y React Native"
    assistant_msg: "Expo facilita mucho el desarrollo mobile con React Native."
    phase: deep_dive
    description: "Coworker"
    expected_entities:
      - label: "facu"

  - user_msg: "Bueno, creo que te di un buen panorama de lo que hago"
    assistant_msg: "Si, un panorama bastante completo. Software, productos propios y un proyecto de AI."
    phase: return
    description: "Summary"
