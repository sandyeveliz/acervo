name: literature_comics
category: literature
description: "Literature and comics discussion with DC, manga, and Latin American authors"
persona: "Martin"
persona_role: "Comic Collector"
narrative_hook: "A passionate reader discusses DC comics, manga, and Latin American literature. Topics jump across genres — does Acervo keep each domain's context separate and accurate?"

turns:
  # ── Phase 1: Reading Preferences (turns 1-8) ──
  - user_msg: "Soy fanatico de la lectura, leo de todo un poco"
    assistant_msg: "Genial! Que generos te gustan mas?"
    phase: intro
    description: "Reader intro"

  - user_msg: "Me llamo Martin y vivo en Buenos Aires"
    assistant_msg: "Buenos Aires tiene librerias increibles. Que barrio?"
    phase: intro
    description: "Personal intro"
    expected_entities:
      - label: "martin"
      - label: "buenos_aires"

  - user_msg: "Vivo en Palermo. Me gustan los comics, la ciencia ficcion y la literatura latinoamericana"
    assistant_msg: "Gran combinacion! Palermo tiene Crack Up, excelente libreria de comics."
    phase: intro
    description: "Genres and location"
    expected_entities:
      - label: "palermo"

  - user_msg: "Si, Crack Up es mi libreria favorita. Compro ahi todos los meses"
    assistant_msg: "Tienen muy buena seleccion de comics americanos e independientes."
    phase: intro
    description: "Favorite store"

  - user_msg: "Mi coleccion tiene mas de 500 comics, entre grapas y TPBs"
    assistant_msg: "Impresionante coleccion! Mas DC o Marvel?"
    phase: intro
    description: "Collection size"

  - user_msg: "Mayormente DC. Batman es mi personaje favorito de toda la vida"
    assistant_msg: "Batman es iconico. Que etapa o escritor te gusta mas?"
    phase: intro
    description: "DC preference"
    expected_entities:
      - label: "martin"

  - user_msg: "Frank Miller es mi escritor favorito de Batman, The Dark Knight Returns es una obra maestra"
    assistant_msg: "DKR cambio los comics para siempre. Miller redefinido a Batman."
    phase: intro
    description: "Favorite writer"
    expected_entities:
      - label: "frank_miller"

  - user_msg: "Tambien me encanta Year One del mismo Miller, es el mejor origen de Batman"
    assistant_msg: "Year One es perfecto. El arte de Mazzucchelli es increible."
    phase: intro
    description: "Another work"
    expected_entities:
      - label: "frank_miller"

  # ── Phase 2: DC Comics Deep Dive (turns 9-18) ──
  - user_msg: "Hablando de otros escritores de Batman, Scott Snyder hizo un run increible en New 52"
    assistant_msg: "El Court of Owls de Snyder es un clasico moderno. Cambiaron Gotham para siempre."
    phase: deep_dive
    description: "Snyder run"
    expected_entities:
      - label: "scott_snyder"

  - user_msg: "Si, Court of Owls y Death of the Family son mis arcos favoritos de Snyder"
    assistant_msg: "Death of the Family con el Joker fue intenso. Greg Capullo en el arte."
    phase: deep_dive
    description: "Snyder arcs"

  - user_msg: "Capullo es un artista increible. Su estilo queda perfecto para Batman"
    assistant_msg: "Si, el duo Snyder-Capullo es de los mejores de DC en las ultimas decadas."
    phase: deep_dive
    description: "Artist"
    expected_entities:
      - label: "greg_capullo"

  - user_msg: "Otro run que me encanta es Batman de Tom King, especialmente The War of Jokes and Riddles"
    assistant_msg: "Tom King tiene un estilo muy literario. War of Jokes and Riddles es brillante."
    phase: deep_dive
    description: "Tom King"
    expected_entities:
      - label: "tom_king"

  - user_msg: "King tambien escribio Mister Miracle que es una obra maestra, con arte de Mitch Gerads"
    assistant_msg: "Mister Miracle es de las mejores maxiseries de DC. Gerads es increible."
    phase: deep_dive
    description: "Mister Miracle"
    expected_entities:
      - label: "mister_miracle"

  - user_msg: "Hablando de otros personajes de DC, me gusta mucho Superman de Grant Morrison"
    assistant_msg: "All-Star Superman de Morrison es quizas la mejor historia de Superman."
    phase: deep_dive
    description: "Superman"
    expected_entities:
      - label: "superman"
      - label: "morrison"

  - user_msg: "All-Star Superman es perfecta. Morrison tambien hizo Animal Man que es alucinante"
    assistant_msg: "Animal Man rompio la cuarta pared de una manera que nadie habia hecho."
    phase: deep_dive
    description: "Animal Man"
    expected_entities:
      - label: "morrison"

  - user_msg: "Y no puedo no mencionar Watchmen de Alan Moore, es la biblia de los comics"
    assistant_msg: "Watchmen cambio la industria entera. Moore es un genio."
    phase: deep_dive
    description: "Watchmen"
    expected_entities:
      - label: "watchmen"
      - label: "moore"

  - user_msg: "Moore tambien hizo The Killing Joke que es la historia definitiva del Joker"
    assistant_msg: "The Killing Joke es brutal. La ambiguedad del final es perfecta."
    phase: deep_dive
    description: "Killing Joke"
    expected_entities:
      - label: "the_killing_joke"

  - user_msg: "Sandman de Neil Gaiman es otra que considero esencial, aunque es mas Vertigo que DC mainstream"
    assistant_msg: "Sandman trasciende generos. Gaiman creo algo unico."
    phase: deep_dive
    description: "Sandman"
    expected_entities:
      - label: "sandman"
      - label: "gaiman"

  # ── Phase 3: Small Talk (turns 19-22) ──
  - user_msg: "Che, me estoy cebando con los comics jaja"
    assistant_msg: "Jaja se nota la pasion! Es un tema que da para horas."
    phase: small_talk
    description: "Self-aware break"
    max_new_nodes: 1

  - user_msg: "Si, es que ayer fui a Crack Up y gaste una fortuna"
    assistant_msg: "Pasa siempre jaja. Que compraste?"
    phase: small_talk
    description: "Recent purchase"
    max_new_nodes: 1

  - user_msg: "Nada, varios TPBs que tenia pendientes. Despues te cuento"
    assistant_msg: "Dale, cuando quieras!"
    phase: small_talk
    description: "Casual"
    max_new_nodes: 1

  - user_msg: "Ahora quiero contarte de otro genero que me vuela la cabeza"
    assistant_msg: "Dale, de que genero hablamos?"
    phase: small_talk
    description: "Transition"
    max_new_nodes: 1

  # ── Phase 4: Manga (turns 23-32) ──
  - user_msg: "Manga! Leo mucho manga tambien. Mi favorito absoluto es Berserk de Kentaro Miura"
    assistant_msg: "Berserk es una obra monumental. Una pena lo de Miura."
    phase: topic_change
    description: "Switch to manga"
    expected_entities:
      - label: "berserk"
      - label: "kentaro_miura"

  - user_msg: "Si, Miura fallecio en 2021 pero su equipo Studio Gaga esta continuando la obra"
    assistant_msg: "Studio Gaga junto con Koji Mori estan haciendo un trabajo respetuoso."
    phase: topic_change
    description: "Continuation"
    expected_entities:
      - label: "studio_gaga"

  - user_msg: "Tengo la coleccion completa de Berserk Deluxe Edition de Dark Horse, son hermosos"
    assistant_msg: "Los Deluxe de Dark Horse son ediciones premium. El formato grande le hace justicia al arte."
    phase: topic_change
    description: "Collection"
    expected_entities:
      - label: "dark_horse"

  - user_msg: "Otro manga que me encanta es Vagabond de Takehiko Inoue, basado en Musashi"
    assistant_msg: "Vagabond tiene el mejor arte de manga que existe. Inoue es un genio."
    phase: topic_change
    description: "Vagabond"
    expected_entities:
      - label: "vagabond"
      - label: "takehiko_inoue"

  - user_msg: "Inoue tambien hizo Slam Dunk que es el manga de basquet por excelencia"
    assistant_msg: "Slam Dunk es un clasico. Revivio el interes en basquet en Japon."
    phase: topic_change
    description: "Slam Dunk"
    expected_entities:
      - label: "slam_dunk"

  - user_msg: "En shonen, mi favorito es Hunter x Hunter de Yoshihiro Togashi"
    assistant_msg: "HxH tiene el mejor sistema de poder de cualquier shonen. Togashi es brillante."
    phase: topic_change
    description: "HxH"
    expected_entities:
      - label: "hunter_x_hunter"
      - label: "yoshihiro_togashi"

  - user_msg: "Togashi tambien hizo Yu Yu Hakusho que es un clasico de los 90s"
    assistant_msg: "Yu Yu Hakusho fue pionero en muchos tropos de shonen."
    phase: topic_change
    description: "Yu Yu Hakusho"

  - user_msg: "Vinland Saga de Makoto Yukimura es otra joya, sobre vikingos y pacifismo"
    assistant_msg: "Vinland Saga evoluciona de accion a filosofia de manera brillante."
    phase: topic_change
    description: "Vinland Saga"
    expected_entities:
      - label: "vinland_saga"

  - user_msg: "One Piece de Eiichiro Oda es el manga mas vendido de la historia, llevo mas de 1100 capitulos"
    assistant_msg: "One Piece es un fenomeno. La construccion del mundo de Oda es inigualable."
    phase: topic_change
    description: "One Piece"
    expected_entities:
      - label: "one_piece"
      - label: "eiichiro_oda"

  - user_msg: "Y Chainsaw Man de Tatsuki Fujimoto es lo mejor del manga moderno, es salvaje"
    assistant_msg: "Fujimoto rompe todas las reglas. Chainsaw Man es caos puro."
    phase: topic_change
    description: "Chainsaw Man"
    expected_entities:
      - label: "chainsaw_man"

  # ── Phase 5: Return to DC (turns 33-38) ──
  - user_msg: "Volviendo a DC, me acorde que no te conte sobre mi coleccion de Batman Knightfall"
    assistant_msg: "Knightfall es epico! Bane rompiendo a Batman es iconico."
    phase: return
    description: "Return to DC"
    checkpoint:
      should_have_context: true
      context_should_mention: ["Knightfall"]

  - user_msg: "Si, tengo la trilogia completa: Knightfall, Knightquest y KnightsEnd"
    assistant_msg: "La trilogia completa es dificil de conseguir. Jean-Paul Valley como Batman fue controversial."
    phase: return
    description: "Knightfall trilogy"

  - user_msg: "Hablando de eventos de DC, Crisis on Infinite Earths de Marv Wolfman cambio todo"
    assistant_msg: "COIE fue el primer gran evento que reseteo el universo DC. Historico."
    phase: return
    description: "DC events"

  - user_msg: "Y Infinite Crisis de Geoff Johns es una gran secuela, con Superboy Prime como villano"
    assistant_msg: "Johns sabe escribir eventos. Superboy Prime es un villano aterrador."
    phase: return
    description: "Infinite Crisis"
    expected_entities:
      - label: "infinite_crisis"

  - user_msg: "Johns tambien revitalizo Green Lantern con Rebirth y la saga de los Lanterns"
    assistant_msg: "La mitologia Lantern que creo Johns es increible. Sinestro Corps War es perfecto."
    phase: return
    description: "Green Lantern"
    expected_entities:
      - label: "green_lantern"

  - user_msg: "Si, Sinestro Corps War y Blackest Night son de los mejores eventos de DC"
    assistant_msg: "Blackest Night con los Black Lanterns fue aterrador y emotivo a la vez."
    phase: return
    description: "Blackest Night"

  # ── Phase 6: Latin American Literature (turns 39-46) ──
  - user_msg: "Ahora cambiando completamente, quiero hablar de literatura. Leo mucho a Borges"
    assistant_msg: "Borges es un gigante. Que obras te gustan mas?"
    phase: new_domain
    description: "Switch to literature"
    expected_entities:
      - label: "borges"

  - user_msg: "Ficciones es mi libro favorito de Borges. El jardin de senderos que se bifurcan es perfecto"
    assistant_msg: "Ficciones es genial. Borges anticipo conceptos de multiverso y metaficcion."
    phase: new_domain
    description: "Ficciones"
    expected_entities:
      - label: "ficciones"

  - user_msg: "Tambien me gusta mucho Julio Cortazar, especialmente Rayuela"
    assistant_msg: "Rayuela es revolucionaria. La estructura no lineal fue radical para su epoca."
    phase: new_domain
    description: "Cortazar"
    expected_entities:
      - label: "julio_cortazar"

  - user_msg: "Garcia Marquez es otro grande. Cien anios de soledad es la novela latinoamericana por excelencia"
    assistant_msg: "El realismo magico de Gabo definio un genero entero."
    phase: new_domain
    description: "Garcia Marquez"
    expected_entities:
      - label: "garcia_marquez"

  - user_msg: "Roberto Bolano es mas moderno pero increible. Los detectives salvajes me volo la cabeza"
    assistant_msg: "Bolano es un monstruo literario. 2666 es otra obra maestra suya."
    phase: new_domain
    description: "Bolano"
    expected_entities:
      - label: "bolano"

  - user_msg: "2666 es brutal, especialmente la parte de los crimenes. Muy dificil de leer"
    assistant_msg: "La parte de los crimenes es desgarradora. Bolano no tenia piedad."
    phase: new_domain
    description: "2666"

  - user_msg: "Samanta Schweblin es una escritora argentina contemporanea que me gusta mucho, Distancia de rescate es genial"
    assistant_msg: "Schweblin maneja la tension como nadie. Distancia de rescate es angustiante."
    phase: new_domain
    description: "Schweblin"
    expected_entities:
      - label: "samanta_schweblin"

  - user_msg: "Y Mariana Enriquez con Los peligros de fumar en la cama, terror argentino de primera"
    assistant_msg: "Enriquez hace terror social. Lo cotidiano se vuelve siniestro."
    phase: new_domain
    description: "Enriquez"
    expected_entities:
      - label: "mariana_enriquez"

  # ── Phase 7: Cross-Domain Connections (turns 47-50) ──
  - user_msg: "Es interesante como los comics y la literatura se cruzan. Moore y Gaiman son muy literarios"
    assistant_msg: "Si, ambos elevan el medio. Sandman podria ser una novela perfectamente."
    phase: stress
    description: "Cross-domain"

  - user_msg: "Borges influencio a Gaiman, especialmente en el concepto de La Biblioteca en Sandman"
    assistant_msg: "Totalmente, La Biblioteca del Suenio es muy borgeana. La Biblioteca de Babel."
    phase: stress
    description: "Borges-Gaiman connection"

  - user_msg: "Y Berserk tiene influencias del realismo magico en como mezcla lo fantastico con lo brutal"
    assistant_msg: "Buen punto. Miura mezclaba belleza y horror como el mejor realismo magico."
    phase: stress
    description: "Manga-literature connection"

  - user_msg: "Bueno, creo que te di un panorama bastante completo de lo que leo. Comics, manga y literatura"
    assistant_msg: "Si, muy eclectico! DC, manga clasico y moderno, y literatura latinoamericana."
    phase: stress
    description: "Summary"
