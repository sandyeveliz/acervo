name: mixed_domains
category: mixed
description: "Mixed domains chaos test — cooking, travel, sports, music, work"
persona: "Diego"
persona_role: "Multi-hobby Enthusiast"
narrative_hook: "Cooking, travel, sports, music, and work — all in one conversation. The ultimate chaos test for topic separation and context restoration across unrelated domains."

turns:
  # ── Phase 1: Cooking (turns 1-7) ──
  - user_msg: "Me llamo Diego y me encanta cocinar, es mi hobby principal"
    assistant_msg: "Hola Diego! Que tipo de cocina te gusta?"
    phase: intro
    description: "Intro + cooking"
    expected_entities:
      - label: "diego"

  - user_msg: "Me especializo en cocina italiana, especialmente pastas frescas"
    assistant_msg: "Las pastas frescas son un arte. Que tipos haces?"
    phase: intro
    description: "Italian cuisine"

  - user_msg: "Hago ravioles, tallarines, sorrentinos y noquis. Mi receta de ravioles es de mi abuela Rosa"
    assistant_msg: "La receta de la abuela es sagrada. De que son los ravioles?"
    phase: intro
    description: "Pasta types"
    expected_entities:
      - label: "rosa"

  - user_msg: "De ricotta y espinaca, con salsa de tomate casera y albahaca del jardin"
    assistant_msg: "Clasico italiano argentino. La albahaca fresca hace toda la diferencia."
    phase: intro
    description: "Recipe details"

  - user_msg: "Tambien hago pizzas en horno de barro que construi yo mismo en el patio"
    assistant_msg: "Un horno de barro propio! Que temperatura logras?"
    phase: intro
    description: "Pizza and oven"

  - user_msg: "Llego a 450 grados, la pizza napoletana necesita al menos 400 para la corteza perfecta"
    assistant_msg: "450 es perfecto. En 60-90 segundos tenes una pizza increible."
    phase: intro
    description: "Temperature"

  - user_msg: "Mi masa es con harina 000, agua, sal y levadura fresca. Fermenta 48 horas en frio"
    assistant_msg: "Fermentacion larga en frio desarrolla sabor y textura. Lo mejor para pizza."
    phase: intro
    description: "Dough recipe"

  # ── Phase 2: Switch to Travel (turns 8-14) ──
  - user_msg: "Changing topics, I want to tell you about my trip to Japan last year"
    assistant_msg: "Japan! Amazing destination. Where did you go?"
    phase: topic_change
    description: "Switch to travel (EN)"

  - user_msg: "I spent 3 weeks there. Started in Tokyo, then Kyoto, Osaka and Hiroshima"
    assistant_msg: "Great itinerary covering the main cities. What was your favorite?"
    phase: topic_change
    description: "Japan itinerary"
    expected_entities:
      - label: "tokyo"
      - label: "kyoto"

  - user_msg: "Kyoto was incredible, the temples are breathtaking. Fushimi Inari was my favorite"
    assistant_msg: "The thousands of torii gates at Fushimi Inari are magical, especially at dawn."
    phase: topic_change
    description: "Kyoto temples"
    expected_entities:
      - label: "fushimi_inari"

  - user_msg: "In Tokyo I stayed in Shinjuku, loved the nightlife and the ramen shops"
    assistant_msg: "Shinjuku is electric. Golden Gai and Omoide Yokocho for ramen?"
    phase: topic_change
    description: "Tokyo neighborhoods"
    expected_entities:
      - label: "shinjuku"

  - user_msg: "Yes! Omoide Yokocho had the best ramen I've ever had. Tonkotsu broth"
    assistant_msg: "Tonkotsu ramen in those tiny yokocho shops is an unforgettable experience."
    phase: topic_change
    description: "Food in Japan"

  - user_msg: "In Osaka I ate the best takoyaki at Dotonbori, amazing street food"
    assistant_msg: "Dotonbori is street food paradise. Osaka is Japan's kitchen."
    phase: topic_change
    description: "Osaka food"
    expected_entities:
      - label: "osaka"
      - label: "dotonbori"

  - user_msg: "Hiroshima was very emotional. The Peace Memorial Museum changed my perspective"
    assistant_msg: "The museum is powerful. A necessary visit to understand history."
    phase: topic_change
    description: "Hiroshima"
    expected_entities:
      - label: "hiroshima"

  # ── Phase 3: Quick Small Talk (turns 15-17) ──
  - user_msg: "Uf, me emocione recordando el viaje"
    assistant_msg: "Es normal, Japon deja una marca profunda."
    phase: small_talk
    description: "Emotional break"
    max_new_nodes: 1

  - user_msg: "Si, tengo que volver. Quiero ir en primavera para ver los cerezos"
    assistant_msg: "Hanami es hermoso. Marzo-abril es la mejor epoca."
    phase: small_talk
    description: "Future plans"
    max_new_nodes: 1

  - user_msg: "Bueno, te cuento de otra cosa"
    assistant_msg: "Dale, de que queres hablar?"
    phase: small_talk
    description: "Transition"
    max_new_nodes: 0

  # ── Phase 4: Sports (turns 18-25) ──
  - user_msg: "Soy hincha fanatico de River Plate, voy a la cancha todos los partidos de local"
    assistant_msg: "Otro fanatico de River! El Monumental es impresionante."
    phase: topic_change
    description: "Switch to sports"
    expected_entities:
      - label: "river_plate"

  - user_msg: "Si, tengo abono desde 2015, el anio que ganamos la Copa Libertadores contra Tigres"
    assistant_msg: "Esa Libertadores fue historica. El gol de Pisculichi en la ida."
    phase: topic_change
    description: "Historical reference"

  - user_msg: "Y la final de la Libertadores 2018 en Madrid contra Boca fue lo mas loco que vivi"
    assistant_msg: "La superfinal en el Bernabeu. Un hecho sin precedentes en el futbol."
    phase: topic_change
    description: "2018 final"

  - user_msg: "Gallardo es el mejor tecnico de la historia de River, gano todo"
    assistant_msg: "Gallardo es una leyenda. Transformo a River en un equipo ganador."
    phase: topic_change
    description: "Coach"
    expected_entities:
      - label: "gallardo"

  - user_msg: "Tambien me gusta el tenis, soy fanatico de Roger Federer aunque ya se retiro"
    assistant_msg: "Federer es el mas elegante que jugo al tenis. Su revés es arte."
    phase: topic_change
    description: "Tennis"
    expected_entities:
      - label: "roger_federer"

  - user_msg: "Vi a Federer en vivo en el US Open 2019, fue una experiencia unica"
    assistant_msg: "El US Open es espectacular. Que suerte verlo en vivo antes del retiro."
    phase: topic_change
    description: "Live event"
    expected_entities:
      - label: "us_open"

  - user_msg: "Ahora sigo a Sinner y Alcaraz, la nueva generacion es increible"
    assistant_msg: "Sinner y Alcaraz son el futuro. Dominan el circuito."
    phase: topic_change
    description: "New generation"
    expected_entities:
      - label: "sinner"
      - label: "alcaraz"

  - user_msg: "Alcaraz me recuerda a Nadal en la intensidad, pero con el juego de Federer"
    assistant_msg: "Buena comparacion. Alcaraz combina potencia y fineza."
    phase: topic_change
    description: "Player comparison"

  # ── Phase 5: Music (turns 26-33) ──
  - user_msg: "Otro tema, escucho mucha musica. Rock nacional argentino principalmente"
    assistant_msg: "El rock nacional es enorme. Que bandas te gustan?"
    phase: new_domain
    description: "Switch to music"

  - user_msg: "Soda Stereo es mi banda favorita de todos los tiempos, Cerati era un genio"
    assistant_msg: "Cerati es el mejor musico que dio Argentina. Soda cambio el rock latino."
    phase: new_domain
    description: "Soda Stereo"
    expected_entities:
      - label: "soda_stereo"
      - label: "cerati"

  - user_msg: "Dynamo es mi disco favorito de Soda, un disco adelantado a su epoca"
    assistant_msg: "Dynamo con shoegaze y electronica era revolucionario para 1992."
    phase: new_domain
    description: "Favorite album"
    expected_entities:
      - label: "dynamo"

  - user_msg: "Tambien me encanta Spinetta, Artaud es quizas el mejor disco argentino"
    assistant_msg: "Artaud de Pescado Rabioso es una obra maestra. Spinetta era unico."
    phase: new_domain
    description: "Spinetta"
    expected_entities:
      - label: "spinetta"

  - user_msg: "Los Redondos son otra banda que me encanta, la mistica de Solari es unica"
    assistant_msg: "Los Redondos son un fenomeno cultural. Solari como letrista es inigualable."
    phase: new_domain
    description: "Redondos"
    expected_entities:
      - label: "los_redondos"

  - user_msg: "Fui a la ultima fecha de Los Redondos en 2001, en Racing. Fue historico"
    assistant_msg: "La despedida en Racing fue legendaria. Uno de los ultimos grandes recitales."
    phase: new_domain
    description: "Concert"

  - user_msg: "De musica internacional me gusta Radiohead, OK Computer es perfecto"
    assistant_msg: "OK Computer predijo la ansiedad digital. Thom Yorke es brillante."
    phase: new_domain
    description: "International music"
    expected_entities:
      - label: "radiohead"

  - user_msg: "Y Pink Floyd, especialmente The Wall y Wish You Were Here"
    assistant_msg: "Pink Floyd es musica cinematica. The Wall es una experiencia completa."
    phase: new_domain
    description: "Pink Floyd"
    expected_entities:
      - label: "pink_floyd"

  # ── Phase 6: Return to Cooking with Correction (turns 34-40) ──
  - user_msg: "Volviendo a la cocina, me acorde que no te conte de mis empanadas"
    assistant_msg: "Empanadas! Un clasico argentino. De que las haces?"
    phase: return
    description: "Return to cooking"
    checkpoint:
      should_have_context: true
      context_should_mention: ["Diego"]

  - user_msg: "Hago empanadas tucumanas, cortadas a cuchillo con comino"
    assistant_msg: "Las tucumanas son las mejores. Cortadas a cuchillo es la verdad."
    phase: return
    description: "Empanadas"

  - user_msg: "No, perdon, me equivoque. Son empanadas saltenas, no tucumanas. Con papa y aji"
    assistant_msg: "Ah, saltenas! Con papa y aji son increibles. Tienen un sabor mas picante."
    phase: return
    description: "Correction"

  - user_msg: "Si, saltenas con papa, carne cortada a cuchillo, aji y huevo duro"
    assistant_msg: "La combinacion completa. Las haces al horno o fritas?"
    phase: return
    description: "Corrected recipe"

  - user_msg: "Al horno siempre. Y el repulgue lo hago tipo trenza, como me enseno mi abuela Rosa"
    assistant_msg: "El repulgue trenza es el mas dificil pero el mas lindo. Rosa te enseno bien!"
    phase: return
    description: "Technique (references abuela)"

  - user_msg: "Also, I've been experimenting with Asian fusion lately, making gyozas with Argentine flavors"
    assistant_msg: "Fusion cooking is great! What Argentine twist do you add to gyozas?"
    phase: return
    description: "Fusion cooking (EN)"

  - user_msg: "I fill them with provoleta cheese and chimichurri instead of the traditional filling"
    assistant_msg: "Provoleta gyozas with chimichurri sounds amazing. Two cultures in one bite."
    phase: return
    description: "Fusion recipe (EN)"

  # ── Phase 7: Work + Rapid Switching (turns 41-50) ──
  - user_msg: "Ah, no te conte que laburo de chef en un restaurante en Palermo"
    assistant_msg: "Sos chef profesional entonces! En que restaurante?"
    phase: new_domain
    description: "Work intro"

  - user_msg: "Se llama Fuego Lento, es un restaurante de cocina argentina moderna"
    assistant_msg: "Fuego Lento, buen nombre. Cocina argentina moderna tiene mucho potencial."
    phase: new_domain
    description: "Restaurant"
    expected_entities:
      - label: "fuego_lento"

  - user_msg: "Somos 8 en la cocina. Mi jefe es el chef ejecutivo Marcos Santana"
    assistant_msg: "Un equipo grande. Marcos Santana es conocido?"
    phase: new_domain
    description: "Team and chef"
    expected_entities:
      - label: "marcos_santana"

  - user_msg: "Si, Marcos salio en MasterChef como jurado invitado. Es bastante conocido"
    assistant_msg: "Salir en MasterChef le da mucha visibilidad. Buena formacion para vos."
    phase: new_domain
    description: "Chef fame"

  - user_msg: "Che, volviendo al futbol, River juega manana contra Boca en el Superclasico"
    assistant_msg: "El Superclasico! Siempre es especial. Como ves el partido?"
    phase: stress
    description: "Quick switch to sports"

  - user_msg: "Y despues del partido me voy al restaurante porque tenemos reservas llenas sabado noche"
    assistant_msg: "Sabado noche con Superclasico antes es un dia intenso!"
    phase: stress
    description: "Work + sports overlap"

  - user_msg: "Si, y el domingo quiero hacer asado en casa con amigos y escuchar Soda"
    assistant_msg: "Asado con amigos y Soda Stereo, no hay plan mejor."
    phase: stress
    description: "Food + music overlap"

  - user_msg: "La playlist de asado tiene que tener Soda, Spinetta, Radiohead y Pink Floyd"
    assistant_msg: "La playlist perfecta para un asado largo. De todo un poco."
    phase: stress
    description: "Cross-domain playlist"

  - user_msg: "El lunes vuelvo al restaurante y Marcos quiere que prepare un menu especial con fusion japonesa"
    assistant_msg: "Menu de fusion japonesa-argentina en Fuego Lento! Se cierra el circulo con tu viaje a Japon."
    phase: stress
    description: "Work + travel connection"

  - user_msg: "Exacto, la idea es usar tecnicas de Japon con ingredientes argentinos. Va a ser increible"
    assistant_msg: "Wagyu con chimichurri, tempura de provoleta, ramen de osobuco. Las posibilidades son infinitas."
    phase: stress
    description: "Final fusion concept"
