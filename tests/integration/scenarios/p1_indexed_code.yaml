name: p1_indexed_code
category: indexed_project
project_path_key: p1
description: "20-turn conversation over indexed TODO app codebase"
persona: "Sandy"

turns:
  # Phase 1: Overview
  - user_msg: "How many files does this project have?"
    assistant_msg: "The project has 31 files organized in backend and frontend directories."
    phase: overview
    expect_intent: overview

  - user_msg: "What is this application about?"
    assistant_msg: "It's a personal TODO app with React frontend and Express backend."
    phase: overview

  # Phase 2: Specific lookups
  - user_msg: "How does authentication work?"
    assistant_msg: "Authentication uses JWT tokens. The auth middleware validates tokens on protected routes."
    phase: specific
    expect_in_context: ["auth"]

  - user_msg: "What database does the app use?"
    assistant_msg: "The app uses SQLite via Knex for database operations."
    phase: specific

  - user_msg: "Show me the todo controller"
    assistant_msg: "The todo controller handles CRUD operations for todos."
    phase: specific
    expect_in_context: ["todo"]

  - user_msg: "What routes are defined?"
    assistant_msg: "There are auth routes and todo routes in the backend."
    phase: specific
    expect_in_context: ["route"]

  # Phase 3: Topic change
  - user_msg: "Tell me about the frontend"
    assistant_msg: "The frontend uses React with TypeScript, with components for todos and auth."
    phase: topic_change
    expect_in_context: ["frontend"]

  - user_msg: "What hooks does it have?"
    assistant_msg: "There are useAuth and useTodos custom hooks."
    phase: specific
    expect_in_context: ["hook"]

  - user_msg: "What styles are used?"
    assistant_msg: "The app has CSS files for app, header, and todo styles."
    phase: specific

  # Phase 4: Small talk
  - user_msg: "That's interesting"
    assistant_msg: "Thanks! Let me know if you want to explore any specific part."
    phase: small_talk

  - user_msg: "The weather is nice today"
    assistant_msg: "I can help you with questions about the project."
    phase: small_talk

  # Phase 5: Return to previous topic
  - user_msg: "Going back to the backend, what middleware does it use?"
    assistant_msg: "It has auth middleware for JWT validation and error middleware for error handling."
    phase: return
    expect_in_context: ["middleware"]

  - user_msg: "What models are defined?"
    assistant_msg: "There are User and Todo models in the backend."
    phase: specific
    expect_in_context: ["model"]

  # Phase 6: Negative questions
  - user_msg: "Does this project use GraphQL?"
    assistant_msg: "No, there's no GraphQL in this project. It uses REST APIs."
    phase: negative

  - user_msg: "Is there a Docker configuration?"
    assistant_msg: "I don't see a Docker configuration in the indexed files."
    phase: negative

  # Phase 7: Cross-references
  - user_msg: "How does the frontend connect to the backend?"
    assistant_msg: "The frontend uses a fetch-based API service to call the Express backend endpoints."
    phase: cross_ref
    expect_in_context: ["api"]

  - user_msg: "What does the architecture look like?"
    assistant_msg: "It's a classic frontend-backend separation with React and Express."
    phase: overview

  # Phase 8: Specific detail
  - user_msg: "What's in the config directory?"
    assistant_msg: "The config directory has database.ts for DB setup and env.ts for environment variables."
    phase: specific
    expect_in_context: ["config"]

  - user_msg: "How are tests organized?"
    assistant_msg: "There's a todo.service.test.ts in the backend tests directory."
    phase: specific

  - user_msg: "What's the project README about?"
    assistant_msg: "The README describes the project setup and usage."
    phase: specific
