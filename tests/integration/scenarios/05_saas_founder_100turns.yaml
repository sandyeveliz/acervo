name: saas_founder_real
category: real_world
description: >
  Fundador indie solo construyendo "Menuboard" (SaaS de menus digitales para restaurantes).
  100 turnos que simulan 3 semanas de trabajo continuo. Patron realista: mensajes muy cortos,
  sesiones mezcladas con descansos, correcciones de errores propios, recall de decisiones
  de turnos tempranos, cambios de tecnologia a mitad, tangentes personales.

  Ideal para medir: (1) cuanto contexto acumula Acervo vs tokens brutos, (2) precision del
  recall en turnos 60-100 sobre decisiones de turnos 5-20, (3) robustez ante correcciones
  y cambios de tecnologia.
persona: "Carlos"
persona_role: "Indie SaaS Founder"
narrative_hook: "Carlos is building Menuboard alone — a digital menu SaaS for restaurants. Over 100 turns and 3 simulated weeks, he makes tech decisions, changes his mind, goes on tangents, and comes back. Can Acervo remember what matters?"

scaling_note: >
  Para 500 turnos: repetir las fases 4-7 con variaciones (nuevas features, nuevos bugs,
  nuevos proveedores). El patron de recall se mantiene: la ganancia de Acervo aumenta
  proporcionalmente porque el grafo no crece en tokens pero el historial bruto si.

turns:

  # ===================================================
  # SESION 1: Arranque del proyecto (turnos 1-18)
  # Patron: mensajes muy cortos, iteracion rapida
  # ===================================================

  - user_msg: "hola"
    assistant_msg: "Hola! En que te puedo ayudar?"
    phase: intro
    description: "Saludo minimal"
    max_new_nodes: 0

  - user_msg: "estoy arrancando un proyecto nuevo, un SaaS para restaurantes"
    assistant_msg: "Buen espacio. Que hace exactamente? Menu digital, reservas, pedidos?"
    phase: intro
    description: "Concepto vago inicial"
    max_new_nodes: 1

  - user_msg: "menus digitales con QR. el cliente escanea y ve el menu en el celu, sin app"
    assistant_msg: "Entendido. Tiene sentido post-pandemia. Como se llama el producto y como te llamas?"
    phase: intro
    description: "Producto definido"

  - user_msg: "me llamo Carlos y el producto se llama Menuboard"
    assistant_msg: "Perfecto Carlos. Y el stack?"
    phase: intro
    description: "Nombre usuario y producto"
    expected_entities:
      - label: "carlos"
      - label: "menuboard"

  - user_msg: "Next.js, Prisma con PlanetScale para la base"
    assistant_msg: "Buen stack. PlanetScale es MySQL-compatible, Prisma lo soporta bien. Autenticacion?"
    phase: intro
    description: "Stack inicial"
    expected_entities:
      - label: "nextjs"
      - label: "prisma"
      - label: "planetscale"

  - user_msg: "NextAuth con Google y magic links. Stripe para pagos"
    assistant_msg: "Solido. NextAuth + PlanetScale necesita el adapter de Prisma. Para el MVP, te conviene arrancar con el schema antes que con auth. Queres que te ayude con eso?"
    phase: intro
    description: "Auth y pagos"
    expected_entities:
      - label: "nextauth"
      - label: "stripe"

  - user_msg: "si dale, arrancamos con el schema"
    assistant_msg: "Lo basico: Restaurant (id, name, slug, ownerId), Menu (id, restaurantId, title, isActive), MenuItem (id, menuId, name, price). Necesitas categorias para agrupar?"
    phase: intro
    description: "Arranque del schema"

  - user_msg: "si agrega Category"
    assistant_msg: "Perfecto. Category (id, menuId, name, order) y MenuItem tiene un categoryId. Orden manejado con un campo `order` en ambas tablas."
    phase: intro
    description: "Iteracion del schema"

  - user_msg: "y para imagenes? cloudinary?"
    assistant_msg: "Cloudinary es lo mas rapido para MVP. Free tier incluye 25GB storage y CDN. La alternativa seria S3, pero Cloudinary gana en facilidad de integracion."
    phase: intro
    description: "Decision imagenes"
    expected_entities:
      - label: "cloudinary"

  - user_msg: "bien voy con cloudinary. che tengo una disenadora que me va a ayudar, se llama Valentina"
    assistant_msg: "Bien! Usa Figma? Hay plugins para exportar a Next.js + Tailwind."
    phase: intro
    description: "Incorporacion disenadora"
    expected_entities:
      - label: "valentina"

  - user_msg: "si usa figma. primero quiero el backend andando y despues arrancamos con el diseno"
    assistant_msg: "Tiene sentido. Una vez que las APIs funcionan, Valentina puede disenar sobre algo real."
    phase: intro
    description: "Plan de trabajo"

  - user_msg: "exacto. me pongo a programar"
    assistant_msg: "Dale, cualquier cosa avisame."
    phase: intro
    description: "Cierre sesion 1"
    max_new_nodes: 0

  - user_msg: "ahi vuelvo, me trabe con nextauth"
    assistant_msg: "Que error te tira?"
    phase: deep_dive
    description: "Vuelta con problema"
    max_new_nodes: 0

  - user_msg: "PrismaClientKnownRequestError en la tabla sessions"
    assistant_msg: "El adapter de Prisma necesita tablas con PascalCase exacto: Account, Session, User, VerificationToken. Las tenes en minuscula en el schema?"
    phase: deep_dive
    description: "Diagnostico error nextauth"

  - user_msg: "ah si, ahi esta. las puse en minuscula"
    assistant_msg: "Ahi esta el problema. Corregi a PascalCase y corre `prisma db push`."
    phase: deep_dive
    description: "Causa encontrada"

  - user_msg: "listo, funciona el login con google"
    assistant_msg: "Perfecto. El magic link lo configuraste tambien?"
    phase: deep_dive
    description: "Login OK"
    max_new_nodes: 0

  - user_msg: "lo dejo para despues. voy con el CRUD de restaurantes"
    assistant_msg: "Bien priorizado. API routes o server actions?"
    phase: deep_dive
    description: "Prioridad CRUD"

  - user_msg: "server actions, nunca los use en prod"
    assistant_msg: "Son geniales para formularios. El patron: archivo `app/actions/restaurant.ts`, `use server` al top, validacion con Zod. Queres el esqueleto?"
    phase: deep_dive
    description: "Decision server actions"

  # ===================================================
  # SESION 2: Features y debugging (turnos 19-38)
  # Patron: trabajo real, preguntas tecnicas especificas
  # ===================================================

  - user_msg: "si con zod dale"
    assistant_msg: "Mando el boilerplate: schema con z.object, parse del formData, check de sesion, y llamada a prisma.create. Es lo estandar para server actions."
    phase: deep_dive
    description: "Server action con Zod"

  - user_msg: "como manejo los errores del server action en el cliente?"
    assistant_msg: "Dos opciones: (1) useFormState de react-dom para capturar el return del action, o (2) try/catch en el action y devolver { error: string } en vez de throw. Para MVP te recomiendo la opcion 2, mas simple."
    phase: deep_dive
    description: "Error handling server actions"

  - user_msg: "ok voy con option 2. che, el slug del restaurante como lo autogenero?"
    assistant_msg: "Podes usar la libreria `slugify` o implementarlo vos: name.toLowerCase().replace(/[^a-z0-9]+/g, '-').trim(). Eso convierte 'El Rincon de Maria' en 'el-rincon-de-maria'."
    phase: deep_dive
    description: "Slug autogenerado"

  - user_msg: "perfecto, lo implemento. oye una cosa: me doy cuenta que no necesito multi-menu por ahora"
    assistant_msg: "Tiene sentido para MVP. Simplifica el schema: quitas la tabla Menu y los items van directo al Restaurant con categories. Menos joins, mas simple."
    phase: deep_dive
    description: "Simplificacion MVP del schema"

  - user_msg: "exacto. cambio el schema ahora antes de avanzar"
    assistant_msg: "Bien, mejor hacerlo ahora que despues. Acordate de hacer `prisma db push --force-reset` en dev porque cambias la estructura."
    phase: deep_dive
    description: "Refactor temprano del schema"

  - user_msg: "hecho. ahora category va directo a restaurant"
    assistant_msg: "Prolijo. El nuevo flujo es Restaurant > Category > MenuItem. Mucho mas limpio para el MVP."
    phase: deep_dive
    description: "Schema simplificado confirmado"

  - user_msg: "si. ahora quiero implementar el endpoint publico del menu, el que ve el cliente con el QR"
    assistant_msg: "Ese es el endpoint mas importante. La URL seria algo como `/r/[slug]`. Usas una page de Next.js con generateStaticParams para pre-renderizar los menus mas populares, o dinamico puro?"
    phase: deep_dive
    description: "Endpoint publico menu"

  - user_msg: "dinamico por ahora, despues optimizo"
    assistant_msg: "Bien. Con `fetch` en el server component y `cache: 'no-store'` tenes el menu siempre actualizado. Cuando necesites performance, cambias a ISR con revalidacion."
    phase: deep_dive
    description: "Decision rendering"

  - user_msg: "perfecto. cuanto tarda un deploy en vercel?"
    assistant_msg: "Con Next.js suele ser 1-3 minutos para un build limpio. El primer deploy puede tardar un poco mas si Prisma tiene que generar el client."
    phase: deep_dive
    description: "Info deploy"
    max_new_nodes: 0

  - user_msg: "ok. oye voy a almorzar, en un rato vuelvo"
    assistant_msg: "Dale, buen provecho!"
    phase: small_talk
    description: "Pausa para almuerzo"
    max_new_nodes: 0

  - user_msg: "volvi. me acordé una cosa importante: necesito un panel de admin para los restaurantes"
    assistant_msg: "Si, el dashboard de admin es clave. Donde va a vivir? Misma app Next.js en `/dashboard` o app separada?"
    phase: deep_dive
    description: "Vuelta con nuevo requerimiento"

  - user_msg: "misma app, en /admin"
    assistant_msg: "Limpio. Con middleware de Next.js podes proteger todo `/admin` con un check de sesion. El layout de admin puede ser un layout separado con sidebar."
    phase: deep_dive
    description: "Arquitectura admin panel"

  - user_msg: "bien. para el sidebar uso shadcn o armo algo custom?"
    assistant_msg: "Para un MVP con una disenadora, shadcn/ui es ideal. Le das los componentes base y Valentina los customiza con Tailwind. Ahorrás un monton de tiempo."
    phase: deep_dive
    description: "Decision UI components"
    expected_entities:
      - label: "shadcn"

  - user_msg: "chevere. voy a configurar shadcn entonces"
    assistant_msg: "Corre `npx shadcn-ui@latest init` y selecciona el esquema de colores. Despues instalas los componentes que necesites uno por uno."
    phase: deep_dive
    description: "Setup shadcn"

  - user_msg: "instalado. oye ayer hable con Valentina y le pase el figma, ya tiene el primer mockup del dashboard"
    assistant_msg: "Genial que Valentina ya arranco. Que tan diferente es el mockup de lo que tenes implementado?"
    phase: deep_dive
    description: "Update Valentina"

  - user_msg: "bastante diferente jaja, pero me gusta el diseno. voy a seguir su guia"
    assistant_msg: "Buen workflow. Deja que el diseno guie la implementacion, no al reves."
    phase: deep_dive
    description: "Workflow diseno-desarrollo"
    max_new_nodes: 0

  - user_msg: "exacto. una duda: como subo imagenes con cloudinary desde el admin?"
    assistant_msg: "Dos opciones: (1) upload directo desde browser con el widget de Cloudinary (sin pasar por tu server), o (2) upload a tu server y de ahi a Cloudinary via API. Para MVP la opcion 1 es mas simple y ahorra bandwidth."
    phase: deep_dive
    description: "Upload imagenes Cloudinary"

  - user_msg: "opcion 1. necesito el unsigned upload preset?"
    assistant_msg: "Si, en el panel de Cloudinary creas un Upload Preset con modo Unsigned. Eso te da un preset_name que usas en el widget del browser sin exponer tu API secret."
    phase: deep_dive
    description: "Cloudinary unsigned preset"

  - user_msg: "perfecto, lo configuro ahora"
    assistant_msg: "Una cosa: guarda el cloud_name y el preset_name como variables de entorno en Next.js. Las publicas con el prefijo NEXT_PUBLIC_ para que el browser las vea."
    phase: deep_dive
    description: "Config env vars Cloudinary"

  - user_msg: "ya lo tenia previsto jaja"
    assistant_msg: "Jaja bien, mejor prevenir."
    phase: deep_dive
    description: "Pequena confirmacion"
    max_new_nodes: 0

  # ===================================================
  # SESION 3: Cambio de tecnologia (turnos 39-52)
  # Patron: decision importante, correccion de rumbo
  # ===================================================

  - user_msg: "oye, lei sobre drizzle orm y me parece mejor que prisma para este caso"
    assistant_msg: "Drizzle es mas liviano y el type-safety es excelente. La gran diferencia: no tiene el runtime de Prisma, genera SQL mas predecible. El trade-off es que el schema se define en TypeScript, no en Prisma Schema. Cuanto llevas con Prisma?"
    phase: topic_change
    description: "Evaluacion cambio Prisma a Drizzle"
    expected_entities:
      - label: "drizzle"

  - user_msg: "poco, solo el schema inicial y las tablas de nextauth. no es tan grave migrar"
    assistant_msg: "Si llevas poco, es el momento ideal para cambiar. Despues cuesta mucho mas. Drizzle + PlanetScale funciona muy bien. Arrancas?"
    phase: topic_change
    description: "Decision de migrar a Drizzle"

  - user_msg: "si, migro ahora"
    assistant_msg: "Pasos: `npm install drizzle-orm @planetscale/database`, definir el schema en `/db/schema.ts`, configurar la conexion con PlanetScale HTTP driver (sin TCP, Drizzle lo necesita para edge). El schema que teniamos lo re-escribis en Drizzle syntax."
    phase: topic_change
    description: "Plan migracion a Drizzle"

  - user_msg: "el driver HTTP es para que funcione en edge functions?"
    assistant_msg: "Exacto. PlanetScale tiene un driver HTTP que funciona en Vercel Edge y Cloudflare Workers, sin necesidad de conexion TCP persistente. Es la razon por la que PlanetScale + Drizzle es tan popular para Next.js."
    phase: topic_change
    description: "Edge driver PlanetScale"

  - user_msg: "tiene sentido. y el auth de nextauth como lo migro? tiene tablas especificas"
    assistant_msg: "NextAuth tiene un adapter oficial para Drizzle. El schema de las tablas es el mismo concepto pero en syntax Drizzle. Te paso la referencia de la doc oficial."
    phase: topic_change
    description: "Migracion nextauth a Drizzle"

  - user_msg: "ya la encontre, gracias. una hora despues: listo, migre todo a drizzle"
    assistant_msg: "Rapido! Funciona el login?"
    phase: topic_change
    description: "Migracion completada"

  - user_msg: "si funciona todo. drizzle se siente mucho mas liviano"
    assistant_msg: "Si, la diferencia de bundle size es notable. Y las queries se ven mas como SQL, lo que ayuda cuando tenes que debuggear."
    phase: topic_change
    description: "Confirmacion migracion exitosa"
    max_new_nodes: 0

  - user_msg: "exacto. oye voy a necesitar analytics basicos para mostrarle a los restaurantes"
    assistant_msg: "Que metricas necesitas? Scans del QR (visitas), items mas vistos, horas pico?"
    phase: topic_change
    description: "Requerimiento analytics"

  - user_msg: "por ahora solo scans por dia y por restaurante"
    assistant_msg: "Simple y util. Dos opciones: (1) tabla `scan_event` en tu propia DB con timestamp y restaurantId, o (2) Posthog o Plausible que tienen free tier. Para MVP yo iria con (1) para tener los datos bajo tu control."
    phase: topic_change
    description: "Diseno analytics"

  - user_msg: "si, tabla propia. agrego scan_event a drizzle"
    assistant_msg: "El schema seria: id, restaurantId, menuItemId (nullable, por si queres trackear item views despues), createdAt, y quizas userAgent para filtrar bots."
    phase: topic_change
    description: "Schema scan_event"

  - user_msg: "buen punto el userAgent"
    assistant_msg: "Si, para no inflar las metricas con crawlers. Con un simple check de /bot|crawler|spider/i filtras la mayoria."
    phase: topic_change
    description: "Filtro bots"
    max_new_nodes: 0

  - user_msg: "perfecto. cuanto cobra stripe en argentina?"
    assistant_msg: "Stripe no opera directamente en Argentina todavia. Las opciones locales son MercadoPago (el mas usado), Pagos360, o Mobbex. Para cobros internacionales podes usar Stripe con una entidad en el exterior, pero para el mercado local lo mas simple es MercadoPago."
    phase: topic_change
    description: "Pagos argentina"
    expected_entities:
      - label: "mercadopago"

  - user_msg: "ah, no sabia que stripe no estaba en argentina. entonces mercadopago"
    assistant_msg: "MercadoPago tiene buena API y SDK para Node.js. La integracion es similar a Stripe. El punto flojo es que la documentacion es menos prolija."
    phase: topic_change
    description: "Decision MercadoPago"

  - user_msg: "ok, cambio stripe por mercadopago entonces en el plan"
    assistant_msg: "Buen ajuste. Guardalo como decision clave: el stack de pagos es MercadoPago, no Stripe."
    phase: topic_change
    description: "Correccion stack de pagos"

  # ===================================================
  # SESION 4: Small talk y contexto personal (turnos 53-62)
  # Patron: informacion personal que deberia recordarse
  # ===================================================

  - user_msg: "bueno, ya son las 7 de la tarde, me voy a descansar"
    assistant_msg: "Buen trabajo hoy. Mañana seguimos."
    phase: small_talk
    description: "Fin del dia"
    max_new_nodes: 0

  - user_msg: "buen dia! volvemos"
    assistant_msg: "Buen dia Carlos! Donde quedamos ayer?"
    phase: small_talk
    description: "Nuevo dia"
    max_new_nodes: 0

  - user_msg: "habia migrado a drizzle y estaba viendo lo de mercadopago"
    assistant_msg: "Exacto. Seguimos con la integracion de MercadoPago o tenes otra cosa urgente?"
    phase: small_talk
    description: "Recall del dia anterior"
    checkpoint:
      should_have_context: true
      context_should_mention: ["drizzle", "mercadopago"]

  - user_msg: "antes de seguir: vivo en Rosario, por si es relevante para el mercado objetivo"
    assistant_msg: "Rosario es un mercado grande para gastronomia. Tenes restaurantes conocidos ahi que puedan ser early adopters?"
    phase: small_talk
    description: "Informacion geografica"
    expected_entities:
      - label: "rosario"

  - user_msg: "si, tengo un amigo que tiene una hamburgueseria en el centro, me dijo que lo prueba"
    assistant_msg: "Perfecto, un early adopter real vale oro. Te da feedback en contexto real desde el primer dia."
    phase: small_talk
    description: "Early adopter"

  - user_msg: "exacto. che, cuanto deberia cobrar por el SaaS?"
    assistant_msg: "Para restaurantes argentinos: el rango tipico es ARS 5.000-15.000/mes para un plan basico. Muchos SaaS locales arrancan con un free tier limitado (1 menu, 50 items) y un plan pago desbloqueado. Cuantos menus y items necesita un restaurante tipico?"
    phase: small_talk
    description: "Pricing inicial"

  - user_msg: "con un menu y 80-100 items para la mayoria. algunos grandes tienen 2-3 menus"
    assistant_msg: "Modelo sugerido: Free (1 menu, 50 items, marca de agua), Pro (3 menus, ilimitado, custom domain, analytics). El Pro lo fijariais en ARS 8.000-12.000/mes."
    phase: small_talk
    description: "Modelo de pricing"

  - user_msg: "me gusta. la custom domain es buena diferenciacion"
    assistant_msg: "Si. El restaurante puede tener `menu.elrestaurante.com` en vez de `menuboard.app/r/slug`. Eso lo implementas con subdominios wildcard en Vercel."
    phase: small_talk
    description: "Custom domain feature"

  - user_msg: "chevere. y cuanto me cuesta a mi vercel con 100 restaurantes?"
    assistant_msg: "Con el plan Pro de Vercel (~$20/mes) y 100 restaurantes activos, estas muy comodo. Las Edge Functions son por invocacion y PlanetScale el free tier aguanta hasta 1B reads/mes. El cuello de botella primero seria Cloudinary si hay muchas imagenes."
    phase: small_talk
    description: "Costos infraestructura"
    max_new_nodes: 0

  - user_msg: "bien, los margenes son buenos entonces"
    assistant_msg: "Si. SaaS es un buen negocio en margenes. El costo variable mas grande va a ser soporte al cliente al principio."
    phase: small_talk
    description: "Analisis de margenes"
    max_new_nodes: 0

  - user_msg: "jaja si, eso lo se por experiencia. bueno, a seguir programando"
    assistant_msg: "Dale!"
    phase: small_talk
    description: "Transicion a trabajo"
    max_new_nodes: 0

  # ===================================================
  # SESION 5: Recall de decisiones pasadas (turnos 63-75)
  # Patron: referencias a turnos 1-20, validacion del grafo
  # ===================================================

  - user_msg: "oye me acorde que habia decidido usar cloudinary para las imagenes, pero veo que next.js tiene Image Optimization nativo. deberia cambiar?"
    assistant_msg: "Cloudinary y Next.js Image Optimization son complementarios, no excluyentes. Cloudinary almacena y transforma las imagenes; el componente `<Image>` de Next.js las sirve optimizadas. Podes usar los dos juntos."
    phase: return
    description: "Recall decision cloudinary"
    checkpoint:
      should_have_context: true
      context_should_mention: ["cloudinary"]

  - user_msg: "ah, no lo habia pensado asi. entonces cloudinary para storage y next/image para el componente"
    assistant_msg: "Exacto. La URL de Cloudinary la pasas como `src` al componente Image de Next.js. Tenes que agregar el dominio `res.cloudinary.com` a `next.config.js` en `images.domains`."
    phase: return
    description: "Integracion cloudinary + next/image"

  - user_msg: "y en cuanto al schema, recuerdo que simplificamos quitando la tabla menu. fue buena decision?"
    assistant_msg: "Para el MVP fue perfecta. Restaurant > Category > MenuItem es limpio y suficiente. Cuando tengas clientes pidiendo menus multiples (menu almuerzo vs cena) lo agregas como iteracion."
    phase: return
    description: "Recall simplificacion schema"
    checkpoint:
      should_have_context: true
      context_should_mention: ["category"]

  - user_msg: "exacto. y valentina esta esperando que le pase algo para disenar"
    assistant_msg: "Que es lo mas util que podes darle ahora? Las pantallas basicas del admin o la pantalla publica del menu?"
    phase: return
    description: "Recall colaboracion Valentina"
    checkpoint:
      should_have_context: true
      context_should_mention: ["valentina"]

  - user_msg: "la publica, es la que ve el cliente. es la mas critica para el pitch"
    assistant_msg: "Tiene razon el enfoque. La pantalla publica es tu demo. Que info le pasas a Valentina? El schema de datos que va a mostrar?"
    phase: return
    description: "Prioridad para Valentina"

  - user_msg: "si, le paso el schema actual y los mockups de competidores"
    assistant_msg: "Perfecto. Los competidores como referencia son utiles pero dile que busque diferenciacion. Que la experiencia se sienta premium."
    phase: return
    description: "Briefing disenadora"
    max_new_nodes: 0

  - user_msg: "total acuerdo. oye, para el plan pago me habia dicho que ibas con mercadopago. como implemento las suscripciones?"
    assistant_msg: "MercadoPago tiene preapproval (suscripciones recurrentes). El flujo es: crear el plan de suscripcion via API, redirigir al usuario a MercadoPago para que apruebe el debito automatico, recibir el webhook de confirmacion. Es mas manual que Stripe pero funciona bien."
    phase: return
    description: "Recall mercadopago + suscripciones"
    checkpoint:
      should_have_context: true
      context_should_mention: ["mercadopago"]

  - user_msg: "ok. y como gestiono el estado del plan en mi app? columna en la tabla de restaurantes?"
    assistant_msg: "Si: subscriptionStatus (free/pro/cancelled), subscriptionId (el ID de MercadoPago), currentPeriodEnd (fecha de vencimiento). Con esos tres campos manejas todo el ciclo de vida."
    phase: return
    description: "Schema suscripciones"

  - user_msg: "perfecto. una cosa: el amigo que me dijo que probaba el producto, se llama Gonzalo"
    assistant_msg: "Gonzalo con la hamburgueseria en Rosario. Buen beta tester. Cuando queres que arranque a probarlo?"
    phase: return
    description: "Nombre del early adopter"
    expected_entities:
      - label: "gonzalo"

  - user_msg: "en dos semanas, cuando tenga el admin funcionando"
    assistant_msg: "Ok, dos semanas para tener el admin listo para Gonzalo. Es un deadline concreto, bien."
    phase: return
    description: "Deadline beta"

  - user_msg: "si, me ayuda tener una fecha fija. che, drizzle tiene migraciones o solo push?"
    assistant_msg: "Drizzle tiene las dos: `drizzle-kit push` para dev (rapido, sin historial) y `drizzle-kit generate` + `drizzle-kit migrate` para produccion con archivos de migracion versionados. En prod siempre usa migraciones."
    phase: return
    description: "Migraciones Drizzle"

  - user_msg: "ok. no lo habia notado. configuro las migraciones entonces"
