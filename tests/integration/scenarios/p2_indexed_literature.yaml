name: p2_indexed_literature
category: indexed_project
project_path_key: p2
description: "15-turn conversation over Sherlock Holmes stories"
persona: "Sandy"

turns:
  # Phase 1: Overview
  - user_msg: "How many stories are in this collection?"
    assistant_msg: "The collection contains 12 stories in The Adventures of Sherlock Holmes."
    phase: overview
    expect_intent: overview

  - user_msg: "Who wrote these stories?"
    assistant_msg: "Arthur Conan Doyle wrote The Adventures of Sherlock Holmes, published in 1892."
    phase: overview

  # Phase 2: Specific character lookup
  - user_msg: "Who is Sherlock Holmes?"
    assistant_msg: "Sherlock Holmes is the main detective character, known for his deductive reasoning."
    phase: specific
    expect_in_context: ["holmes"]

  - user_msg: "Who is Dr. Watson?"
    assistant_msg: "Dr. John Watson is Holmes' companion and narrator of the stories."
    phase: specific

  - user_msg: "Tell me about A Scandal in Bohemia"
    assistant_msg: "It's the first story, featuring Irene Adler who outwits Holmes."
    phase: specific
    expect_in_context: ["scandal"]

  # Phase 3: Topic change
  - user_msg: "What about The Red-Headed League?"
    assistant_msg: "It involves a man hired for a strange job because of his red hair."
    phase: topic_change

  - user_msg: "What happens in that story?"
    assistant_msg: "Jabez Wilson is lured away while criminals tunnel into a bank vault."
    phase: specific

  # Phase 4: Small talk
  - user_msg: "These are great stories"
    assistant_msg: "They're classic detective fiction! What else would you like to know?"
    phase: small_talk

  # Phase 5: Return
  - user_msg: "Going back to the characters, where does Holmes live?"
    assistant_msg: "Holmes lives at 221B Baker Street in London."
    phase: return

  - user_msg: "What methods does Holmes use?"
    assistant_msg: "He uses observation, deductive reasoning, and disguises."
    phase: specific

  # Phase 6: Negative
  - user_msg: "Does Professor Moriarty appear in these stories?"
    assistant_msg: "Moriarty doesn't appear in The Adventures collection."
    phase: negative

  # Phase 7: Overview return
  - user_msg: "What are the main themes across the stories?"
    assistant_msg: "Crime solving, deduction, justice, and the contrast between appearance and reality."
    phase: overview

  - user_msg: "What locations appear frequently?"
    assistant_msg: "London, Baker Street, and various country estates."
    phase: specific

  - user_msg: "What genre would you classify these as?"
    assistant_msg: "Mystery and detective fiction, with elements of adventure."
    phase: overview

  - user_msg: "Give me a summary of the collection"
    assistant_msg: "It's a collection of 12 detective stories featuring Sherlock Holmes and Dr. Watson solving crimes in Victorian England."
    phase: overview
    expect_intent: overview
